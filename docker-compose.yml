services:
  iptv-api:
    build: .
    container_name: iptv-api
    restart: unless-stopped
    tty: true
    stdin_open: true

    ports:
      - "8888:8080"

    volumes:
      - ./config:/iptv-api/config
      - ./output:/iptv-api/output

    environment:
      PUBLIC_SCHEME: "http"
      # Replace with your public domain or IP
      PUBLIC_DOMAIN: "127.0.0.1"
      PUBLIC_PORT: "80"
      NGINX_HTTP_PORT: "8080"
      CDN_URL: ""
      HTTP_PROXY: ""

networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: "fd00::/80"
